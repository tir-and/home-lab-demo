version: '3'

# Pi-hole — DNS server and network-wide ad blocker
# Session 04 — DNS and Ad Blocking
#
# Before starting:
#   1. Copy .env.template to .env
#   2. Fill in your chosen WEBPASSWORD in .env
#   3. Disable systemd-resolved stub listener (see docs/session-log-04-pihole.md)
#   4. Run: docker compose up -d
#
# Admin dashboard: http://<your-vm-ip>:8080/admin
# DNS server:      <your-vm-ip>:53

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped

    ports:
      - "53:53/tcp"          # DNS (TCP)
      - "53:53/udp"          # DNS (UDP)
      - "8080:80"            # Web admin dashboard

    environment:
      # Web interface password — set in .env file, never hardcode here
      WEBPASSWORD: ${PIHOLE_PASSWORD}

      # Upstream DNS servers Pi-hole forwards non-blocked queries to
      # Using Cloudflare (1.1.1.1) and Google (8.8.8.8) as fallbacks
      PIHOLE_DNS_: "1.1.1.1;8.8.8.8"

      # Set your local timezone for accurate query timestamps
      TZ: "Europe/London"

      # Virtual IP used for blocked domains — returns this instead of real IP
      FTLCONF_LOCAL_IPV4: ${PIHOLE_VIRTUAL_IP:-0.0.0.0}

    volumes:
      # Persists Pi-hole config and blocklists across container restarts
      - ./etc-pihole:/etc/pihole

      # Persists custom DNS and DHCP config
      - ./etc-dnsmasq.d:/etc/dnsmasq.d

    # Needed for Pi-hole to function correctly as a DNS server
    cap_add:
      - NET_ADMIN

    # Connect to the shared lab network so other services can use Pi-hole for DNS
    networks:
      - lab-network

networks:
  lab-network:
    external: true
    # Create this network once with: docker network create lab-network
    # All lab services share this network for container-name DNS resolution
